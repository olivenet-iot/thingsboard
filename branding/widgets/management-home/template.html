<div class="mh-root">
  <div class="mh-header">
    <h1 class="mh-title">Customer Overview</h1>
    <p class="mh-subtitle">Manage your SignConnect customers, sites, and devices</p>
  </div>
  <div class="mh-stats"></div>
  <div class="mh-actions">
    <button class="mh-btn mh-btn-primary mh-new-customer-btn">+ New Customer</button>
  </div>
  <div class="mh-table-wrap">
    <table class="mh-table">
      <thead>
        <tr>
          <th class="mh-th-name">Customer</th>
          <th class="mh-th-sites">Sites</th>
          <th class="mh-th-devices">Devices</th>
          <th class="mh-th-online">Online</th>
          <th class="mh-th-created">Created</th>
        </tr>
      </thead>
      <tbody class="mh-tbody"></tbody>
    </table>
    <div class="mh-loading">
      <div class="mh-skeleton"></div>
      <div class="mh-skeleton mh-skeleton-short"></div>
      <div class="mh-skeleton"></div>
      <div class="mh-skeleton mh-skeleton-short"></div>
    </div>
    <div class="mh-empty">No customers yet. Click "+ New Customer" to get started.</div>
  </div>
</div>
