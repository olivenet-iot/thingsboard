<div class="nt-root">
  <div class="nt-header">
    <div class="nt-brand">SIGNCONNECT</div>
    <div class="nt-actions">
      <button class="nt-collapse-all" title="Collapse all">&#9776;</button>
    </div>
  </div>
  <div class="nt-search">
    <input type="text" class="nt-search-input" placeholder="Search assets..." />
  </div>
  <div class="nt-reports-link" style="display:none;">
    <div class="nt-reports-row">
      <svg class="nt-reports-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <span class="nt-reports-label">Reports</span>
      <span class="nt-reports-arrow">&#8250;</span>
    </div>
  </div>
  <div class="nt-alarms-link" style="display:none;">
    <div class="nt-alarms-row">
      <svg class="nt-alarms-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <span class="nt-alarms-label">Alarms</span>
      <span class="nt-alarm-badge hidden">0</span>
    </div>
  </div>
  <div class="nt-tree-container">
    <div class="nt-tree"></div>
    <div class="nt-loading">
      <div class="nt-skeleton"></div>
      <div class="nt-skeleton nt-skeleton-short"></div>
      <div class="nt-skeleton"></div>
      <div class="nt-skeleton nt-skeleton-short"></div>
      <div class="nt-skeleton"></div>
    </div>
    <div class="nt-empty">No assets found</div>
  </div>
  <div class="nt-footer">
    <div class="nt-footer-stats"></div>
  </div>
</div>
